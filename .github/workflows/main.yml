name: Build UAC Bypasser

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # We must use windows-latest because this project uses Windows APIs
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Adjust this to match your project's version

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration Release --no-restore

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UAC_Bypasser_Executable
        # This path assumes a standard dotnet build output. 
        # You may need to adjust it (e.g., net6.0, net8.0, or net472)
        path: bin/Release/**/UAC_Bypasser.exe
