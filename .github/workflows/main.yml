name: Build UAC Bypasser (Self-Contained)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Targeting the version from your error message

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Single File EXE
      # -r win-x64: Targets 64-bit Windows
      # --self-contained: Includes the .NET runtime in the EXE
      # PublishSingleFile: Merges everything into one executable
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true `
        /p:PublishSingleFile=true `
        /p:PublishReadyToRun=true `
        /p:IncludeNativeLibrariesForSelfExtract=true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UAC_Bypasser_Standalone
        # This path targets the specific publish folder created by the command above
        path: bin/Release/net10.0-windows/win-x64/publish/UAC_Bypasser.exe
